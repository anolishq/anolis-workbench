name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "**/*.md"
      - "**/*.png"
      - "**/*.svg"
  pull_request:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "**/*.md"
      - "**/*.png"
      - "**/*.svg"
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff==0.15.0

      - name: Check
        run: |
          ruff check . --output-format=github
          ruff format --check .

  typecheck:
    name: Type check (mypy)
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-lock.txt

      - name: Install dependencies
        run: |
          pip install -r requirements-lock.txt
          pip install -e .

      - name: Run mypy
        run: mypy workbench/backend system-composer/backend

  test:
    name: Unit tests
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-lock.txt

      - name: Install dependencies
        run: |
          pip install -r requirements-lock.txt
          pip install -e .

      - name: Run tests
        run: |
          pytest workbench/tests/unit/ system-composer/tests/unit/ -v --tb=short

      - name: Validate composer-control OpenAPI
        run: python contracts/validate-composer-control-openapi.py

  contract-drift:
    name: Contract drift check
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/checkout@v4
        with:
          repository: FEASTorg/anolis
          path: anolis-upstream
          sparse-checkout: |
            schemas/machine-profile.schema.json
            schemas/runtime-config.schema.json
            schemas/http/runtime-http.openapi.v0.yaml
          sparse-checkout-cone-mode: false

      - name: Compare bundled schemas
        run: |
          diff workbench/backend/schemas/machine-profile.schema.json \
               anolis-upstream/schemas/machine-profile.schema.json || \
            (echo "machine-profile schema drift detected" && exit 1)

          diff workbench/backend/schemas/runtime-config.schema.json \
               anolis-upstream/schemas/runtime-config.schema.json || \
            (echo "runtime-config schema drift detected" && exit 1)

      - name: Compare OpenAPI contract snapshot
        run: |
          diff contracts/runtime-http.openapi.v0.yaml \
               anolis-upstream/schemas/http/runtime-http.openapi.v0.yaml || \
            (echo "runtime-http OpenAPI contract drift detected" && exit 1)
