name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect code changes
    runs-on: ubuntu-24.04
    permissions:
      pull-requests: read
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4
        id: filter
        with:
          predicate-quantifier: every
          filters: |
            code:
              - '**'
              - '!docs/**'
              - '!**/*.md'
              - '!**/*.png'
              - '!**/*.svg'

  frontend:
    name: Frontend (Node / Vite build)
    needs: [changes]
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Audit dependencies
        run: npm audit --audit-level=high
        working-directory: frontend

      - name: Check formatting
        run: npm run format:check
        working-directory: frontend

      - name: Lint
        run: npm run lint
        working-directory: frontend

      - name: Type check (svelte-check)
        run: npm run check
        working-directory: frontend

      - name: Build
        run: npm run build
        working-directory: frontend

      - name: Report bundle size
        run: npm run bundle:size
        working-directory: frontend

      - name: Install Playwright browser
        run: npm run smoke:install
        working-directory: frontend

      - name: Browser smoke test
        run: npm run smoke
        working-directory: frontend

  lint:
    name: Lint (ruff)
    needs: [changes]
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            uv.lock

      - name: Install dependencies
        run: uv sync --locked --extra dev

      - name: Check
        run: |
          uv run ruff check . --output-format=github
          uv run ruff format --check .

  typecheck:
    name: Type check (mypy)
    needs: [changes]
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            uv.lock

      - name: Install dependencies
        run: uv sync --locked --extra dev

      - name: Run mypy
        run: uv run mypy anolis_workbench tests

  test:
    name: Unit tests
    needs: [changes]
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Run frontend unit tests (Vitest coverage)
        run: npm run test:unit:coverage
        working-directory: frontend

      - name: Run frontend component tests (Vitest coverage)
        run: npm run test:components:coverage
        working-directory: frontend

      - name: Build frontend (required by Python integration tests)
        run: npm run build
        working-directory: frontend

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            uv.lock

      - name: Install dependencies
        run: uv sync --locked --extra dev

      - name: Run tests
        run: uv run pytest tests/ -v --tb=short

      - name: Validate composer-control OpenAPI
        run: uv run python contracts/validate-composer-control-openapi.py

      - name: Validate workbench-api OpenAPI
        run: uv run python contracts/validate-workbench-api-openapi.py

  contract-drift:
    name: Contract drift check
    needs: [changes]
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"

      - name: Verify runtime-config schema lock
        run: python3 scripts/verify-upstream-schema.py --schema runtime-config --require-release-artifact

      - name: Verify machine-profile schema lock
        run: python3 scripts/verify-upstream-schema.py --schema machine-profile --require-release-artifact

      - name: Verify runtime-http OpenAPI lock
        run: python3 scripts/verify-upstream-schema.py --schema runtime-http --require-release-artifact

  freeze-smoke:
    name: Freeze smoke test (Linux)
    needs: [changes]
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        run: npm ci && npm run build
        working-directory: frontend

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            uv.lock

      - name: Install freeze dependencies
        # Locked, matching the `test` lane — so freeze-smoke resolves the same
        # pinned versions instead of floating within the pyproject ranges (which
        # made this lane non-deterministic under the deprecation guard). See #180.
        run: uv sync --locked --extra dev --extra ssh

      - name: Freeze sidecar
        run: |
          uv run python scripts/freeze_server.py \
            --name anolis-workbench \
            --output-dir dist \
            --min-size-bytes 10000000

      - name: Verify frozen executable runs
        run: |
          set -euo pipefail
          timeout 10 dist/anolis-workbench --version
          timeout 10 dist/anolis-workbench --help

      - name: Health-check the frozen sidecar
        run: |
          set -euo pipefail
          ANOLIS_WORKBENCH_SIDECAR_BIN="$PWD/dist/anolis-workbench" \
            uv run python -m pytest tests/integration/test_sidecar_health.py -v

  version-sync:
    needs: [changes]
    if: needs.changes.outputs.code == 'true'
    uses: anolishq/.github/.github/workflows/version-sync.yml@c76784aff711e6540d539f6a5c3ea33c63627930 # v2
    with:
      python-version: '3.12'
      working-directory: '.'

  desktop:
    name: Desktop (Rust / Tauri)
    needs: [changes]
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          components: rustfmt, clippy

      - name: Rust cache
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: desktop/src-tauri

      - name: Install Linux Tauri dependencies
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            librsvg2-dev \
            libayatana-appindicator3-dev \
            patchelf

      # tauri-build's build script validates that every `externalBin`
      # (the frozen Python sidecar) exists for the host target triple, even
      # under `cargo check`/`clippy`. The real sidecar is only produced by the
      # release pipeline, so stage an empty placeholder to satisfy the
      # existence check in this lint-only lane (it is never bundled or run).
      - name: Stage placeholder sidecar for tauri-build
        run: |
          set -euo pipefail
          triple="$(rustc -vV | sed -n 's/^host: //p')"
          touch "binaries/anolis-workbench-sidecar-${triple}"
        working-directory: desktop/src-tauri

      - name: Check formatting
        run: cargo fmt --check
        working-directory: desktop/src-tauri

      - name: Clippy
        run: cargo clippy -- -D warnings
        working-directory: desktop/src-tauri

      - name: Check
        run: cargo check
        working-directory: desktop/src-tauri

  ok:
    name: ok
    if: always()
    needs: [changes, frontend, lint, typecheck, test, contract-drift, freeze-smoke, version-sync, desktop]
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Fail if any upstream job failed or was cancelled
        if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')
        run: exit 1
      - name: Pass
        run: echo 'All checks passed or were skipped'
