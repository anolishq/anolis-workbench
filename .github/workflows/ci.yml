name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "**/*.md"
      - "**/*.png"
      - "**/*.svg"
  pull_request:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "**/*.md"
      - "**/*.png"
      - "**/*.svg"
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend (Node / Vite build)
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Audit dependencies
        run: npm audit --audit-level=high
        working-directory: frontend

      - name: Check formatting
        run: npm run format:check
        working-directory: frontend

      - name: Lint
        run: npm run lint
        working-directory: frontend

      - name: Type check (svelte-check)
        run: npm run check
        working-directory: frontend

      - name: Build
        run: npm run build
        working-directory: frontend

      - name: Report bundle size
        run: npm run bundle:size
        working-directory: frontend

      - name: Install Playwright browser
        run: npm run smoke:install
        working-directory: frontend

      - name: Browser smoke test
        run: npm run smoke
        working-directory: frontend

  lint:
    name: Lint (ruff)
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            uv.lock

      - name: Install dependencies
        run: uv sync --locked --extra dev

      - name: Check
        run: |
          uv run ruff check . --output-format=github
          uv run ruff format --check .

  typecheck:
    name: Type check (mypy)
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            uv.lock

      - name: Install dependencies
        run: uv sync --locked --extra dev

      - name: Run mypy
        run: uv run mypy anolis_workbench tests

  test:
    name: Unit tests
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Run frontend unit tests (Vitest coverage)
        run: npm run test:unit:coverage
        working-directory: frontend

      - name: Run frontend component tests (Vitest coverage)
        run: npm run test:components:coverage
        working-directory: frontend

      - name: Build frontend (required by Python integration tests)
        run: npm run build
        working-directory: frontend

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            uv.lock

      - name: Install dependencies
        run: uv sync --locked --extra dev

      - name: Run tests
        run: uv run pytest tests/ -v --tb=short

      - name: Validate composer-control OpenAPI
        run: uv run python contracts/validate-composer-control-openapi.py

      - name: Validate workbench-api OpenAPI
        run: uv run python contracts/validate-workbench-api-openapi.py

  contract-drift:
    name: Contract drift check
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"

      - name: Verify runtime-config schema lock
        run: python3 scripts/verify-upstream-schema.py --schema runtime-config --require-release-artifact

      - name: Verify machine-profile schema lock
        run: python3 scripts/verify-upstream-schema.py --schema machine-profile --require-release-artifact

      - name: Verify runtime-http OpenAPI lock
        run: python3 scripts/verify-upstream-schema.py --schema runtime-http --require-release-artifact

  freeze-smoke:
    name: Freeze smoke test (Linux)
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        run: npm ci && npm run build
        working-directory: frontend

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"

      - name: Install freeze dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install .[dev,ssh]

      - name: Freeze sidecar
        run: |
          python scripts/freeze_server.py \
            --name anolis-workbench \
            --output-dir dist \
            --min-size-bytes 10000000

      - name: Verify frozen executable runs
        run: |
          set -euo pipefail
          timeout 10 dist/anolis-workbench --version
          timeout 10 dist/anolis-workbench --help

  version-sync:
    uses: anolishq/.github/.github/workflows/version-sync.yml@15f6901a9ef7e845841d371a64addb04b0f7755a # main
    with:
      python-version: '3.12'
      working-directory: '.'
