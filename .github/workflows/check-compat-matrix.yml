name: Check compatibility matrix

on:
  schedule:
    - cron: "0 9 * * 1"  # Every Monday at 09:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  check:
    name: Check for upstream releases
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"

      - name: Install PyYAML
        run: pip install pyyaml --quiet

      - name: Check and update compatibility matrix
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          python3 - <<'EOF'
          import os, pathlib, re, subprocess
          import yaml

          matrix_path = pathlib.Path("anolis_workbench/schemas/compatibility-matrix.yaml")
          content = matrix_path.read_text()
          matrix = yaml.safe_load(content)

          def latest_release(repo: str) -> str:
              result = subprocess.run(
                  ["gh", "api", f"repos/{repo}/releases/latest", "--jq", ".tag_name"],
                  capture_output=True, text=True, check=True,
              )
              return result.stdout.strip().lstrip("v")

          def update_version_for_repo(text: str, repo: str, new_version: str) -> str:
              # Anchor on the unique repo: line then replace the very next version: line.
              # Preserves surrounding quotes (or lack thereof) and all indentation.
              pattern = (
                  r'(repo:\s*' + re.escape(repo) + r'\s*\n\s*version:\s*["\']?)[\d.]+(["\']?)'
              )
              return re.sub(pattern, r'\g<1>' + new_version + r'\g<2>', text)

          updated = False

          # Check runtime
          latest = latest_release(matrix["runtime"]["repo"])
          current = str(matrix["runtime"]["version"])
          if latest != current:
              print(f"runtime: {current} -> {latest}")
              content = update_version_for_repo(content, matrix["runtime"]["repo"], latest)
              updated = True

          # Check providers
          for provider_id, entry in matrix.get("providers", {}).items():
              latest = latest_release(entry["repo"])
              current = str(entry["version"])
              if latest != current:
                  print(f"{provider_id}: {current} -> {latest}")
                  content = update_version_for_repo(content, entry["repo"], latest)
                  updated = True

          if updated:
              matrix_path.write_text(content)
              print("Matrix updated.")
              with open(os.environ["GITHUB_OUTPUT"], "a") as f:
                  f.write("updated=true\n")
          else:
              print("All components are up to date.")
              with open(os.environ["GITHUB_OUTPUT"], "a") as f:
                  f.write("updated=false\n")
          EOF

      - name: Open or update PR
        id: pr
        if: steps.check.outputs.updated == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          BRANCH="chore/bump-compat-matrix-$(date +%Y%m%d)"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add anolis_workbench/schemas/compatibility-matrix.yaml
          git commit -m "chore: bump compatibility matrix to latest upstream releases"
          git push origin "$BRANCH"

          gh pr create \
            --title "chore: bump compatibility matrix" \
            --body "Automated: one or more upstream components have a newer release.

          Review the diff and validate that workbench has been tested against the new versions.
          Then update \`workbench_version\` in \`anolis_workbench/schemas/compatibility-matrix.yaml\` to match the next workbench release version before merging.
          The release gate will block any release where \`workbench_version\` does not match \`pyproject.toml\`." \
            --base main \
            --head "$BRANCH" \
          || true  # don't fail if PR already exists for this branch

          PR="$(gh pr view "$BRANCH" --json number --jq .number 2>/dev/null || echo "")"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"
          echo "pr=$PR" >> "$GITHUB_OUTPUT"

      # 0F conformance check (anolis-workbench#137 Part B): warn — not block — when
      # this bump pins a (provider, version) pair the org ADPP matrix marks ❌.
      # The verdict is published durably by anolishq/.github (adpp-compat-data
      # branch). Best-effort: a fetch failure must not break the bump.
      - name: Check 0F conformance verdict
        id: verdict
        if: steps.check.outputs.updated == 'true' && steps.pr.outputs.pr != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          python3 - <<'PYEOF'
          import json, os, pathlib, subprocess
          import yaml
          from collections import defaultdict

          def out(k, v):
              with open(os.environ["GITHUB_OUTPUT"], "a") as f:
                  f.write(f"{k}={v}\n")

          # Pull the durable 0F verdict (provider = repo short-name, version =
          # v-prefixed tag, status ∈ pass|fail|error). error = no verdict / harness
          # incompat — NOT a failure, so it is never flagged.
          try:
              raw = subprocess.run(
                  ["gh", "api",
                   "repos/anolishq/.github/contents/data/adpp-compat/latest.json?ref=adpp-compat-data",
                   "-H", "Accept: application/vnd.github.raw"],
                  capture_output=True, text=True, check=True).stdout
              verdict = json.loads(raw)
          except Exception as e:  # noqa: BLE001 — advisory check, never hard-fail
              print(f"could not fetch 0F verdict ({e}); skipping conformance check")
              out("incompat", "false")
              raise SystemExit(0)

          matrix = yaml.safe_load(
              pathlib.Path("anolis_workbench/schemas/compatibility-matrix.yaml").read_text())

          by_pair = defaultdict(list)
          for p in verdict.get("pairs", []):
              by_pair[(p["provider"], str(p["version"]).lstrip("v"))].append(
                  (p["protocol"], p["status"], p.get("summary", "")))

          # Match workbench's pinned providers (id == 0F provider short-name;
          # version compared without the v prefix). The runtime↔protocol axis is
          # intentionally not mapped yet — we warn on any protocol the pinned
          # provider version fails, listing it. See docs/compatibility-matrices.md.
          incompat = []
          for pid, entry in matrix.get("providers", {}).items():
              ver = str(entry["version"]).lstrip("v")
              for proto, status, summary in by_pair.get((pid, ver), []):
                  if status == "fail":
                      incompat.append((pid, ver, proto, summary))

          if not incompat:
              print("No 0F ❌ (fail) for any pinned provider pair.")
              out("incompat", "false")
              raise SystemExit(0)

          lines = [
              "⚠️ **0F conformance warning** — this bump pins "
              f"{len({(i[0], i[1]) for i in incompat})} pair(s) the org ADPP "
              "compatibility matrix marks ❌ (fail):",
              "",
              "| provider | version | protocol | 0F summary |",
              "|---|---|---|---|",
          ]
          for pid, ver, proto, summary in incompat:
              lines.append(f"| `{pid}` | `{ver}` | `{proto}` | {summary} |")
          lines += [
              "",
              "Source: `anolishq/.github` → `adpp-compat-data:data/adpp-compat/latest.json`. "
              "`error`/⚠️ (no verdict) and unmeasured pairs are not flagged. "
              "**This is a warning, not a block** — confirm the pair is acceptable before merging.",
          ]
          pathlib.Path("0f-warning.md").write_text("\n".join(lines))
          print("\n".join(lines))
          out("incompat", "true")
          PYEOF

      - name: Annotate PR with 0F warning
        if: steps.verdict.outputs.incompat == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh label create 0f-incompat --color d93f0b \
            --description "Bump pins a (provider, version) pair 0F marks as not conformant" \
            || true
          gh pr edit "${{ steps.pr.outputs.pr }}" --add-label 0f-incompat
          gh pr comment "${{ steps.pr.outputs.pr }}" --body-file 0f-warning.md
