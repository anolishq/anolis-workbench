openapi: 3.1.0
info:
  title: Anolis Runtime HTTP API
  version: "0.1.0"
  description: |
    Normative contract for the currently shipped `/v0` runtime HTTP surface.
    This contract is compatibility-first and reflects implementation behavior.
servers:
  - url: http://127.0.0.1:8080
    description: Default local runtime bind
tags:
  - name: runtime
  - name: providers
  - name: devices
  - name: state
  - name: control
  - name: automation
  - name: events
paths:
  /v0/runtime/status:
    get:
      tags: [runtime]
      operationId: getRuntimeStatus
      summary: Get runtime health and provider availability summary
      responses:
        "200":
          description: Runtime status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RuntimeStatusResponse'
  /v0/providers/health:
    get:
      tags: [providers]
      operationId: getProvidersHealth
      summary: Get provider health, supervision, and per-device freshness
      responses:
        "200":
          description: Provider health summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProvidersHealthResponse'
  /v0/telemetry/status:
    get:
      tags: [telemetry]
      operationId: getTelemetryStatus
      summary: Get telemetry (InfluxDB sink) health and throughput counters
      responses:
        "200":
          description: Telemetry sink health
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TelemetryStatusResponse'
  /v0/runs:
    get:
      tags: [runs]
      operationId: listRuns
      summary: List runs (newest first)
      parameters:
        - { name: limit, in: query, required: false, schema: { type: integer, minimum: 1, maximum: 200 } }
        - { name: offset, in: query, required: false, schema: { type: integer, minimum: 0 } }
      responses:
        "200":
          description: A page of runs
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RunsListResponse'
    post:
      tags: [runs]
      operationId: openRun
      summary: Open a run (at most one open per runtime)
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RunOpenRequest'
      responses:
        "200":
          description: The opened run
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RunResponse'
        "412":
          description: A run is already open
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v0/runs/{run_id}:
    get:
      tags: [runs]
      operationId: getRun
      summary: Get a run by id
      parameters:
        - { name: run_id, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: The run
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RunResponse'
        "404":
          description: Unknown run
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v0/runs/{run_id}/close:
    post:
      tags: [runs]
      operationId: closeRun
      summary: Close a run (idempotent)
      parameters:
        - { name: run_id, in: path, required: true, schema: { type: string } }
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RunCloseRequest'
      responses:
        "200":
          description: The closed run
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RunResponse'
        "404":
          description: Unknown run
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v0/runs/{run_id}/events:
    get:
      tags: [runs]
      operationId: listRunEvents
      summary: List a run's event/marker stream (oldest-first)
      description: >-
        The append-only neutral event stream for a run, correlated by `run_id` +
        per-run monotonic `sequence`. Includes runtime-owned lifecycle events
        (run_opened/run_closed, mode_change, parameter_change, automation_fault)
        and operator `annotation` markers. Consumed by exporters to render run
        annotations; telemetry is correlated to runs by time window, never by tag.
      parameters:
        - { name: run_id, in: path, required: true, schema: { type: string } }
        - { name: limit, in: query, required: false, schema: { type: integer, default: 200, maximum: 1000 } }
        - { name: offset, in: query, required: false, schema: { type: integer, default: 0 } }
      responses:
        "200":
          description: A page of run events
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RunEventsListResponse'
        "404":
          description: Unknown run
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      tags: [runs]
      operationId: appendRunMarker
      summary: Append an operator marker (annotation) to a run
      description: >-
        Operators append open-vocabulary domain markers (`category` is fixed to
        `annotation`; the marker's domain meaning rides in `type` + `payload`).
        The closed lifecycle categories are runtime-owned and cannot be created
        here. Rejected for a closed run (events are immutable once a run closes).
      parameters:
        - { name: run_id, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RunMarkerRequest'
      responses:
        "200":
          description: The persisted event
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RunEventResponse'
        "400":
          description: Invalid marker
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "404":
          description: Unknown run
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "409":
          description: Run is closed (events are immutable)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v0/devices:
    get:
      tags: [devices]
      operationId: getDevices
      summary: List discovered devices
      responses:
        "200":
          description: Device inventory
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DevicesResponse'
  /v0/devices/{provider_id}/{device_id}/capabilities:
    get:
      tags: [devices]
      operationId: getDeviceCapabilities
      summary: Get capabilities for a specific device
      parameters:
        - $ref: '#/components/parameters/provider_id'
        - $ref: '#/components/parameters/device_id'
      responses:
        "200":
          description: Device capabilities
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeviceCapabilitiesResponse'
        "404":
          $ref: '#/components/responses/NotFound'
        "400":
          $ref: '#/components/responses/BadRequest'
  /v0/state:
    get:
      tags: [state]
      operationId: getAllState
      summary: Get cached state for all devices with available state
      responses:
        "200":
          description: Aggregated device state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StateCollectionResponse'
  /v0/state/{provider_id}/{device_id}:
    get:
      tags: [state]
      operationId: getDeviceState
      summary: Get cached state for one device
      parameters:
        - $ref: '#/components/parameters/provider_id'
        - $ref: '#/components/parameters/device_id'
        - name: signal_id
          in: query
          description: Optional repeated filter for returned signal ids
          required: false
          style: form
          explode: true
          schema:
            type: array
            items:
              type: string
      responses:
        "200":
          description: Device state snapshot
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeviceStateResponse'
        "404":
          $ref: '#/components/responses/NotFound'
        "503":
          $ref: '#/components/responses/Unavailable'
        "400":
          $ref: '#/components/responses/BadRequest'
  /v0/call:
    post:
      tags: [control]
      operationId: postCall
      summary: Execute a device function by numeric function id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CallRequest'
      responses:
        "200":
          description: Call accepted/executed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CallResponse'
        "400":
          $ref: '#/components/responses/BadRequest'
        "404":
          $ref: '#/components/responses/NotFound'
        "409":
          $ref: '#/components/responses/FailedPrecondition'
        "503":
          $ref: '#/components/responses/Unavailable'
        "504":
          $ref: '#/components/responses/DeadlineExceeded'
        "500":
          $ref: '#/components/responses/InternalError'
  /v0/mode:
    get:
      tags: [automation]
      operationId: getMode
      summary: Get current runtime mode
      responses:
        "200":
          description: Current mode
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ModeResponse'
        "503":
          $ref: '#/components/responses/Unavailable'
    post:
      tags: [automation]
      operationId: postMode
      summary: Set runtime mode
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetModeRequest'
      responses:
        "200":
          description: Mode set
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ModeResponse'
        "400":
          $ref: '#/components/responses/BadRequest'
        "409":
          $ref: '#/components/responses/FailedPrecondition'
        "503":
          $ref: '#/components/responses/Unavailable'
  /v0/parameters:
    get:
      tags: [automation]
      operationId: getParameters
      summary: Get runtime automation parameters
      responses:
        "200":
          description: Parameter inventory
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ParametersResponse'
        "503":
          $ref: '#/components/responses/Unavailable'
    post:
      tags: [automation]
      operationId: postParameter
      summary: Update a runtime automation parameter
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetParameterRequest'
      responses:
        "200":
          description: Parameter updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SetParameterResponse'
        "400":
          $ref: '#/components/responses/BadRequest'
        "404":
          $ref: '#/components/responses/NotFound'
        "503":
          $ref: '#/components/responses/Unavailable'
  /v0/automation/tree:
    get:
      tags: [automation]
      operationId: getAutomationTree
      summary: Get loaded behavior tree XML
      responses:
        "200":
          description: Behavior tree content
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AutomationTreeResponse'
        "404":
          $ref: '#/components/responses/NotFound'
        "503":
          $ref: '#/components/responses/Unavailable'
        "500":
          $ref: '#/components/responses/InternalError'
  /v0/automation/status:
    get:
      tags: [automation]
      operationId: getAutomationStatus
      summary: Get automation runtime status
      responses:
        "200":
          description: Automation status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AutomationStatusResponse'
        "503":
          $ref: '#/components/responses/Unavailable'
  /v0/events:
    get:
      tags: [events]
      operationId: getEventsStream
      summary: Subscribe to SSE event stream
      description: |
        SSE endpoint. Response body is a text/event-stream stream.
        Initial contract depth is provisional and validates endpoint presence
        plus top-level streaming media type.

        Event types: state_update, quality_change, device_availability,
        mode_change, parameter_change, provider_health_change, and
        automation_fault. `automation_fault` (engine-abnormal only — a generic
        `locus`, never a BT node) carries the engine fault; the former `bt_error`
        compatibility alias was removed in v0.1.26. An ordinary unsuccessful
        execution is NOT a fault (it surfaces via `execution_status=failed`).
      parameters:
        - name: provider_id
          in: query
          required: false
          schema:
            type: string
        - name: device_id
          in: query
          required: false
          schema:
            type: string
        - name: signal_id
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: SSE stream
          content:
            text/event-stream:
              schema:
                type: string
        "503":
          $ref: '#/components/responses/Unavailable'
components:
  parameters:
    provider_id:
      name: provider_id
      in: path
      required: true
      schema:
        type: string
    device_id:
      name: device_id
      in: path
      required: true
      schema:
        type: string
  responses:
    BadRequest:
      description: Invalid argument or malformed payload
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    FailedPrecondition:
      description: Request rejected due to mode or lifecycle precondition
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unavailable:
      description: Service or provider unavailable
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    DeadlineExceeded:
      description: Request exceeded timeout
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    InternalError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  schemas:
    Status:
      type: object
      additionalProperties: false
      required: [code, message]
      properties:
        code:
          type: string
        message:
          type: string
    ErrorResponse:
      type: object
      additionalProperties: false
      required: [status]
      properties:
        status:
          $ref: '#/components/schemas/Status'
    RuntimeMode:
      type: string
      enum: [MANUAL, AUTO, IDLE, FAULT]
    RuntimeStatusProvider:
      type: object
      additionalProperties: false
      required: [provider_id, state, device_count]
      properties:
        provider_id:
          type: string
        state:
          type: string
          enum: [AVAILABLE, UNAVAILABLE]
        device_count:
          type: integer
    RuntimeStatusResponse:
      type: object
      additionalProperties: false
      required: [status, version, mode, uptime_seconds, polling_interval_ms, providers, device_count]
      properties:
        status:
          $ref: '#/components/schemas/Status'
        version:
          type: string
          description: Runtime version string (e.g. "0.1.21")
        mode:
          $ref: '#/components/schemas/RuntimeMode'
        uptime_seconds:
          type: integer
        polling_interval_ms:
          type: integer
        providers:
          type: array
          items:
            $ref: '#/components/schemas/RuntimeStatusProvider'
        device_count:
          type: integer
    TelemetryBackend:
      type: object
      additionalProperties: false
      required: [url, org, bucket]
      properties:
        url:
          type: string
        org:
          type: string
        bucket:
          type: string
    TelemetryStatusResponse:
      type: object
      additionalProperties: false
      required:
        [status, enabled, running, connected, total_written, total_failed, pending_batch, queue_depth, dropped_events]
      properties:
        status:
          $ref: '#/components/schemas/Status'
        enabled:
          type: boolean
          description: Telemetry is enabled in config (the sink was configured to run)
        running:
          type: boolean
          description: The sink background thread is running (false if start failed, e.g. no token)
        connected:
          type: boolean
          description: Last InfluxDB write attempt succeeded
        total_written:
          type: integer
        total_failed:
          type: integer
        pending_batch:
          type: integer
          description: Lines buffered awaiting the next flush
        queue_depth:
          type: integer
          description: Events in the subscriber queue awaiting batching
        dropped_events:
          type: integer
          description: Events dropped on subscriber-queue overflow (flush fell behind)
        backend:
          $ref: '#/components/schemas/TelemetryBackend'
          description: Backend coordinates (omitted when telemetry is disabled); never includes the API token
    DeviceInfo:
      type: object
      additionalProperties: false
      required: [provider_id, device_id, display_name, type]
      properties:
        provider_id:
          type: string
        device_id:
          type: string
        display_name:
          type: string
        type:
          type: string
    DevicesResponse:
      type: object
      additionalProperties: false
      required: [status, devices]
      properties:
        status:
          $ref: '#/components/schemas/Status'
        devices:
          type: array
          items:
            $ref: '#/components/schemas/DeviceInfo'
    ValueType:
      type: string
      enum: [double, int64, uint64, bool, string, bytes]
    ArgSpec:
      type: object
      required: [type, required]
      properties:
        type:
          $ref: '#/components/schemas/ValueType'
        required:
          type: boolean
        description:
          type: string
        unit:
          type: string
        min:
          type: number
        max:
          type: number
      additionalProperties: false
    FunctionSpec:
      type: object
      additionalProperties: false
      required: [function_id, name, label, args]
      properties:
        function_id:
          type: integer
        name:
          type: string
        label:
          type: string
        args:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/ArgSpec'
    SignalSpec:
      type: object
      additionalProperties: false
      required: [signal_id, value_type, label]
      properties:
        signal_id:
          type: string
        value_type:
          $ref: '#/components/schemas/ValueType'
        label:
          type: string
    DeviceCapabilities:
      type: object
      additionalProperties: false
      required: [signals, functions]
      properties:
        signals:
          type: array
          items:
            $ref: '#/components/schemas/SignalSpec'
        functions:
          type: array
          items:
            $ref: '#/components/schemas/FunctionSpec'
    DeviceCapabilitiesResponse:
      type: object
      additionalProperties: false
      required: [status, provider_id, device_id, capabilities]
      properties:
        status:
          $ref: '#/components/schemas/Status'
        provider_id:
          type: string
        device_id:
          type: string
        capabilities:
          $ref: '#/components/schemas/DeviceCapabilities'
    TypedValue:
      type: object
      required: [type]
      properties:
        type:
          $ref: '#/components/schemas/ValueType'
        double:
          type: number
        int64:
          type: integer
        uint64:
          type: integer
          minimum: 0
        bool:
          type: boolean
        string:
          type: string
        base64:
          type: string
      additionalProperties: false
    SignalValue:
      type: object
      additionalProperties: false
      required: [signal_id, value, timestamp_epoch_ms, quality, age_ms]
      properties:
        signal_id:
          type: string
        value:
          $ref: '#/components/schemas/TypedValue'
        timestamp_epoch_ms:
          type: integer
        quality:
          type: string
          enum: [OK, STALE, UNAVAILABLE, FAULT]
        age_ms:
          type: integer
    DeviceState:
      type: object
      additionalProperties: false
      required: [provider_id, device_id, quality, values]
      properties:
        provider_id:
          type: string
        device_id:
          type: string
        quality:
          type: string
          enum: [OK, STALE, UNAVAILABLE, FAULT]
        values:
          type: array
          items:
            $ref: '#/components/schemas/SignalValue'
    StateCollectionResponse:
      type: object
      additionalProperties: false
      required: [status, generated_at_epoch_ms, devices]
      properties:
        status:
          $ref: '#/components/schemas/Status'
        generated_at_epoch_ms:
          type: integer
        devices:
          type: array
          items:
            $ref: '#/components/schemas/DeviceState'
    DeviceStateResponse:
      type: object
      additionalProperties: false
      required: [status, generated_at_epoch_ms, provider_id, device_id, quality, values]
      properties:
        status:
          $ref: '#/components/schemas/Status'
        generated_at_epoch_ms:
          type: integer
        provider_id:
          type: string
        device_id:
          type: string
        quality:
          type: string
          enum: [OK, STALE, UNAVAILABLE, FAULT]
        values:
          type: array
          items:
            $ref: '#/components/schemas/SignalValue'
    CallRequest:
      type: object
      additionalProperties: false
      required: [provider_id, device_id, function_id]
      properties:
        provider_id:
          type: string
        device_id:
          type: string
        function_id:
          type: integer
        args:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/TypedValue'
    CallResponse:
      type: object
      additionalProperties: false
      required: [status, provider_id, device_id, function_id, post_call_poll_triggered]
      properties:
        status:
          $ref: '#/components/schemas/Status'
        provider_id:
          type: string
        device_id:
          type: string
        function_id:
          type: integer
        post_call_poll_triggered:
          type: boolean
    ModeResponse:
      type: object
      additionalProperties: false
      required: [status, mode]
      properties:
        status:
          $ref: '#/components/schemas/Status'
        mode:
          $ref: '#/components/schemas/RuntimeMode'
    SetModeRequest:
      type: object
      additionalProperties: false
      required: [mode]
      properties:
        mode:
          $ref: '#/components/schemas/RuntimeMode'
    ParameterType:
      type: string
      enum: [double, int64, bool, string]
    ParameterValue:
      anyOf:
        - type: number
        - type: integer
        - type: boolean
        - type: string
    ParameterDefinition:
      type: object
      required: [name, type, value]
      properties:
        name:
          type: string
        type:
          $ref: '#/components/schemas/ParameterType'
        value:
          $ref: '#/components/schemas/ParameterValue'
        min:
          type: number
        max:
          type: number
        allowed_values:
          type: array
          items:
            type: string
      additionalProperties: false
    ParametersResponse:
      type: object
      additionalProperties: false
      required: [status, parameters]
      properties:
        status:
          $ref: '#/components/schemas/Status'
        parameters:
          type: array
          items:
            $ref: '#/components/schemas/ParameterDefinition'
    SetParameterRequest:
      type: object
      additionalProperties: false
      required: [name, value]
      properties:
        name:
          type: string
        value:
          $ref: '#/components/schemas/ParameterValue'
    SetParameterResponse:
      type: object
      additionalProperties: false
      required: [status, parameter]
      properties:
        status:
          $ref: '#/components/schemas/Status'
        parameter:
          type: object
          additionalProperties: false
          required: [name, value]
          properties:
            name:
              type: string
            value:
              $ref: '#/components/schemas/ParameterValue'
    AutomationTreeResponse:
      type: object
      additionalProperties: false
      required: [status, tree]
      properties:
        status:
          $ref: '#/components/schemas/Status'
        tree:
          type: string
    AutomationVersion:
      type: object
      additionalProperties: false
      required: [engine_kind, id, digest, digest_scope]
      properties:
        engine_kind:
          type: string
          description: Engine implementation, e.g. "behavior_tree".
        id:
          type: string
          description: Human label (e.g. definition basename) — NOT an identity.
        digest:
          type: string
          description: Hex sha256 of the loaded definition bytes.
        digest_scope:
          type: string
          enum: [include_closure, top_level_file]
          description: >-
            What the digest covers. "top_level_file" hashes only the top-level
            definition bytes (a known limitation until include-closure hashing
            lands) and must not be relied on as full provenance.
    TagScope:
      type: object
      additionalProperties: false
      required: [provider_ids, device_ids, signal_ids]
      description: Operator-supplied selector for which series a run owns (auto-capture deferred).
      properties:
        provider_ids: { type: array, items: { type: string } }
        device_ids: { type: array, items: { type: string } }
        signal_ids: { type: array, items: { type: string } }
    Run:
      type: object
      additionalProperties: false
      required:
        - schema_version
        - run_id
        - state
        - close_reason
        - started_at_epoch_ms
        - ended_at_epoch_ms
        - automation_version
        - runtime_version
        - polling_interval_ms
        - params
        - tag_scope
        - experiment_label
      properties:
        schema_version: { type: integer }
        run_id:
          type: string
          description: Time-sortable, runtime-name-prefixed id.
        state:
          type: string
          enum: [open, closed]
        close_reason:
          oneOf:
            - { type: string, enum: [operator_stop, completed, failed, superseded, abandoned] }
            - { type: "null" }
        started_at_epoch_ms: { type: integer }
        ended_at_epoch_ms:
          oneOf:
            - { type: integer }
            - { type: "null" }
        automation_version:
          oneOf:
            - $ref: '#/components/schemas/AutomationVersion'
            - { type: "null" }
          description: The immutable automation version this run executed, or null for a manual-only run.
        runtime_version: { type: string }
        polling_interval_ms:
          type: integer
          description: Recorded so a consumer can reason about time-window boundary fuzz.
        params: { type: object, additionalProperties: true }
        tag_scope: { $ref: '#/components/schemas/TagScope' }
        experiment_label:
          oneOf:
            - { type: string }
            - { type: "null" }
    RunResponse:
      type: object
      additionalProperties: false
      required: [status, run]
      properties:
        status: { $ref: '#/components/schemas/Status' }
        run: { $ref: '#/components/schemas/Run' }
    RunsListResponse:
      type: object
      additionalProperties: false
      required: [status, runs, count]
      properties:
        status: { $ref: '#/components/schemas/Status' }
        runs: { type: array, items: { $ref: '#/components/schemas/Run' } }
        count: { type: integer }
    RunOpenRequest:
      type: object
      additionalProperties: false
      properties:
        experiment_label: { type: string }
        params: { type: object, additionalProperties: true }
        tag_scope: { $ref: '#/components/schemas/TagScope' }
    RunCloseRequest:
      type: object
      additionalProperties: false
      properties:
        close_reason:
          type: string
          enum: [operator_stop, completed, failed, superseded]
    RunEvent:
      type: object
      additionalProperties: false
      required:
        - schema_version
        - run_id
        - sequence
        - category
        - type
        - occurred_at_epoch_ms
        - recorded_at_epoch_ms
        - payload
      properties:
        schema_version: { type: integer }
        run_id: { type: string }
        sequence:
          type: integer
          description: Per-run monotonic sequence; (run_id, sequence) is the durable event key.
        category:
          type: string
          enum: [run_opened, run_closed, mode_change, parameter_change, automation_fault, annotation]
          description: Closed neutral lifecycle taxonomy. Domain vocabulary stays out — markers ride as `annotation`.
        type:
          type: string
          description: Open string — marker type, close reason, or fault locus; may be empty.
        occurred_at_epoch_ms:
          type: integer
          description: When the source observed the event.
        recorded_at_epoch_ms:
          type: integer
          description: When the journal persisted the event.
        payload: { type: object, additionalProperties: true }
    RunEventResponse:
      type: object
      additionalProperties: false
      required: [status, event]
      properties:
        status: { $ref: '#/components/schemas/Status' }
        event: { $ref: '#/components/schemas/RunEvent' }
    RunEventsListResponse:
      type: object
      additionalProperties: false
      required: [status, events, count]
      properties:
        status: { $ref: '#/components/schemas/Status' }
        events: { type: array, items: { $ref: '#/components/schemas/RunEvent' } }
        count: { type: integer }
    RunMarkerRequest:
      type: object
      additionalProperties: false
      required: [type]
      properties:
        type:
          type: string
          description: Operator-defined marker type (open vocabulary), e.g. "feed" or "sample".
        payload: { type: object, additionalProperties: true }
        occurred_at_epoch_ms:
          type: integer
          description: When the marker occurred; defaults to the time the runtime records it.
    AutomationStatusResponse:
      type: object
      additionalProperties: false
      required:
        - status
        - execution_status
        - automation_version
        - last_evaluation_at_epoch_ms
        - engine_diagnostics
        - run_id
      properties:
        status:
          $ref: '#/components/schemas/Status'
        # ---- Neutral, engine-agnostic fields (the forward contract) ----
        execution_status:
          type: string
          enum: [idle, running, blocked, failed, completed, unknown]
          description: >-
            Engine-neutral execution status. "blocked" means "not advancing"
            (for behaviour trees this is the >10-tick FAILURE heuristic, NOT
            necessarily benign waiting). "completed" is emitted ONLY when the
            engine declares a terminal completed state (a behaviour tree may
            never emit it until terminal capture lands). Engine faults
            (exceptions, corrupt definitions) are NOT a status value — they
            surface as automation_fault events.
        execution_reason:
          type: string
          enum: [mode_gate, waiting, terminal_failure, engine_fault, no_definition, stopped]
          description: Optional coarse reason qualifying execution_status (enumerated, not free text).
        automation_version:
          oneOf:
            - $ref: '#/components/schemas/AutomationVersion'
            - type: "null"
          description: Identity of the loaded definition, or null when none is loaded.
        last_evaluation_at_epoch_ms:
          type: integer
          description: Last engine evaluation time (NOT last observable progress).
        engine_diagnostics:
          type: object
          additionalProperties: true
          description: >-
            UNSTABLE / non-contractual engine internals (e.g. BT tick counters).
            Do not depend on its keys; they may change or disappear.
        run_id:
          oneOf:
            - type: string
            - type: "null"
          description: The currently-open run, or null (run registry lands in a later phase).
        last_error:
          oneOf:
            - type: string
            - type: "null"
          description: Last automation error message, or null when none is recorded.
    ProviderSupervision:
      type: object
      additionalProperties: false
      required: [enabled, attempt_count, max_attempts, crash_detected, circuit_open, next_restart_in_ms]
      properties:
        enabled:
          type: boolean
        attempt_count:
          type: integer
        max_attempts:
          type: integer
        crash_detected:
          type: boolean
        circuit_open:
          type: boolean
        next_restart_in_ms:
          oneOf:
            - type: integer
            - type: "null"
    ProviderDeviceHealth:
      type: object
      additionalProperties: false
      required: [device_id, health, last_poll_ms, staleness_ms]
      properties:
        device_id:
          type: string
        health:
          type: string
          enum: [OK, WARNING, STALE, UNAVAILABLE, UNKNOWN]
        last_poll_ms:
          type: integer
        staleness_ms:
          type: integer
    ProviderHealth:
      type: object
      additionalProperties: false
      required:
        - provider_id
        - state
        - lifecycle_state
        - last_seen_ago_ms
        - uptime_seconds
        - device_count
        - supervision
        - devices
      properties:
        provider_id:
          type: string
        state:
          type: string
          enum: [AVAILABLE, UNAVAILABLE]
        lifecycle_state:
          type: string
          enum: [RUNNING, RECOVERING, RESTARTING, CIRCUIT_OPEN, DOWN]
        last_seen_ago_ms:
          oneOf:
            - type: integer
            - type: "null"
        uptime_seconds:
          type: integer
        device_count:
          type: integer
        supervision:
          $ref: '#/components/schemas/ProviderSupervision'
        devices:
          type: array
          items:
            $ref: '#/components/schemas/ProviderDeviceHealth'
    ProvidersHealthResponse:
      type: object
      additionalProperties: false
      required: [status, providers]
      properties:
        status:
          $ref: '#/components/schemas/Status'
        providers:
          type: array
          items:
            $ref: '#/components/schemas/ProviderHealth'
