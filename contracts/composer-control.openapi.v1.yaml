openapi: 3.0.3
info:
  title: Anolis System Composer Control API
  version: "1.0.0"
  description: |
    Commissioning control API exposed by the System Composer backend.
    This contract covers launch orchestration behavior, not runtime /v0 HTTP data APIs.
paths:
  /api/status:
    get:
      summary: Get composer/runtime process status
      responses:
        "200":
          description: Current status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponse"
  /api/projects/{name}/preflight:
    post:
      summary: Run preflight checks for a project
      parameters:
        - $ref: "#/components/parameters/ProjectName"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: Preflight completed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PreflightResponse"
        "400":
          $ref: "#/components/responses/Error400"
        "404":
          $ref: "#/components/responses/Error404"
  /api/projects/{name}/launch:
    post:
      summary: Launch runtime for a project
      parameters:
        - $ref: "#/components/parameters/ProjectName"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          $ref: "#/components/responses/Ok200"
        "400":
          $ref: "#/components/responses/Error400"
        "404":
          $ref: "#/components/responses/Error404"
        "409":
          $ref: "#/components/responses/Error409"
        "500":
          $ref: "#/components/responses/Error500"
  /api/projects/{name}/stop:
    post:
      summary: Stop runtime process
      parameters:
        - $ref: "#/components/parameters/ProjectName"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          $ref: "#/components/responses/Ok200"
        "400":
          $ref: "#/components/responses/Error400"
        "404":
          $ref: "#/components/responses/Error404"
  /api/projects/{name}/restart:
    post:
      summary: Restart runtime process for project config
      parameters:
        - $ref: "#/components/parameters/ProjectName"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          $ref: "#/components/responses/Ok200"
        "400":
          $ref: "#/components/responses/Error400"
        "404":
          $ref: "#/components/responses/Error404"
        "409":
          $ref: "#/components/responses/Error409"
        "500":
          $ref: "#/components/responses/Error500"
  /api/projects/{name}/logs:
    get:
      summary: Stream project logs via SSE
      parameters:
        - $ref: "#/components/parameters/ProjectName"
      responses:
        "200":
          description: Event stream with keepalive comments and line frames
          content:
            text/event-stream:
              schema:
                type: string
        "400":
          $ref: "#/components/responses/Error400"
        "404":
          $ref: "#/components/responses/Error404"
components:
  parameters:
    ProjectName:
      name: name
      in: path
      required: true
      schema:
        type: string
      description: Composer project name
  responses:
    Ok200:
      description: Operation succeeded
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/OkResponse"
    Error400:
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Error404:
      description: Project or resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Error409:
      description: Conflict with current runtime state
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Error500:
      description: Unexpected backend error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
  schemas:
    OkResponse:
      type: object
      required: [ok]
      properties:
        ok:
          type: boolean
      additionalProperties: true
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string
        code:
          type: string
        errors:
          type: array
          items:
            type: object
            properties:
              source:
                type: string
              code:
                type: string
              path:
                type: string
              message:
                type: string
            required: [source, code, path, message]
            additionalProperties: true
      additionalProperties: true
    StatusResponse:
      type: object
      required: [version, active_project, running, pid, composer]
      properties:
        version:
          type: integer
        active_project:
          type: string
          nullable: true
        running:
          type: boolean
        pid:
          type: integer
          nullable: true
        composer:
          type: object
          required: [host, port, operator_ui_base]
          properties:
            host:
              type: string
            port:
              type: integer
            operator_ui_base:
              type: string
          additionalProperties: true
      additionalProperties: true
    PreflightResponse:
      type: object
      required: [ok, checks]
      properties:
        ok:
          type: boolean
        checks:
          type: array
          items:
            type: object
      additionalProperties: true
