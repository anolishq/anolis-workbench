# Compatibility matrix for anolis-workbench.
#
# workbench_version MUST match pyproject.toml at all times (enforced by CI).
# Update this file when validating against a new runtime or provider release.
# The scheduled check-compat-matrix workflow will open a PR when upstreams
# publish newer releases.

workbench_version: "0.3.1"

runtime:
  repo: anolishq/anolis
  version: "0.1.13"

providers:
  anolis-provider-sim:
    repo: anolishq/anolis-provider-sim
    version: "0.2.2"
  anolis-provider-bread:
    repo: anolishq/anolis-provider-bread
    version: "0.2.6"
  anolis-provider-ezo:
    repo: anolishq/anolis-provider-ezo
    version: "0.2.3"
