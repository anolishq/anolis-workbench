runtime:
  name: bioreactor-manual
  shutdown_timeout_ms: 3000
  startup_timeout_ms: 30000

http:
  enabled: true
  bind: 127.0.0.1
  port: 8080
  cors_allowed_origins:
    - http://localhost:3000
    - http://127.0.0.1:3000
  cors_allow_credentials: false

providers:
  - id: bread0
    command: ../anolis-provider-bread/build/dev-linux-hardware-release/anolis-provider-bread
    args: ["--config", "config/bioreactor/provider-bread.bioreactor.yaml"]
    timeout_ms: 5000
    hello_timeout_ms: 2000
    ready_timeout_ms: 10000
    restart_policy:
      enabled: true
      max_attempts: 3
      backoff_ms: [200, 500, 1000]
      timeout_ms: 30000

  - id: ezo0
    command: ../anolis-provider-ezo/build/dev-linux-hardware-release/anolis-provider-ezo
    args: ["--config", "config/bioreactor/provider-ezo.bioreactor.yaml"]
    timeout_ms: 5000
    hello_timeout_ms: 5000
    ready_timeout_ms: 10000
    restart_policy:
      enabled: true
      max_attempts: 3
      backoff_ms: [200, 500, 1000]
      timeout_ms: 30000

polling:
  interval_ms: 2500

telemetry:
  enabled: false

automation:
  enabled: false

logging:
  level: info
