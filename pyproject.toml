[build-system]
requires = ["hatchling>=1.25"]
build-backend = "hatchling.build"

[project]
name = "anolis-workbench"
version = "0.2.0"
description = "Anolis commissioning workbench with handoff export tooling."
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.10"
dependencies = [
    "pyyaml>=6.0.0,<7.0.0",
    "jsonschema>=4.22.0,<5.0.0",
    "requests>=2.32.0,<3.0.0",
]

[project.optional-dependencies]
dev = [
    "ruff>=0.15.0,<1.0.0",
    "pytest>=8.0.0,<10.0.0",
    "pytest-timeout>=2.0.0,<3.0.0",
    "psutil>=5.9.0,<7.0.0",
    "mypy>=1.8.0,<2.0.0",
    "types-requests>=2.31.0",
    "types-psutil>=5.9.0",
    "types-PyYAML>=6.0.0",
    "pyinstaller>=6.0.0,<7.0.0",
]

[project.scripts]
anolis-workbench = "anolis_workbench.cli.main:main"
anolis-package = "anolis_workbench.cli.package_cli:main"
anolis-validate = "anolis_workbench.cli.validate_cli:main"

[tool.hatch.build]
# Generated build output — gitignored but must be bundled in the distribution.
artifacts = [
    "anolis_workbench/frontend/dist/**",
]

[tool.hatch.build.targets.wheel]
packages = ["anolis_workbench"]
include = [
    "anolis_workbench/catalog/*.json",
    "anolis_workbench/schema/*.json",
    "anolis_workbench/schemas/*.json",
    "anolis_workbench/templates/*/system.json",
    # SPA build output — generated by `npm run build` in frontend/
    "anolis_workbench/frontend/dist/**",
]

# ---------------------------------------------------------------------------
# Ruff
# ---------------------------------------------------------------------------
[tool.ruff]
line-length = 120
target-version = "py310"

[tool.ruff.lint]
select = ["E", "F", "B", "I"]
ignore = []

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "auto"

# ---------------------------------------------------------------------------
# pytest
# ---------------------------------------------------------------------------
[tool.pytest.ini_options]
testpaths = [
    "tests",
]
addopts = "--strict-markers -ra"
markers = [
    "integration: integration tests that run against runtime/provider processes",
    "slow: long-running tests not required in default CI lane",
]
norecursedirs = ["build", ".venv", "__pycache__", "*.egg-info"]

# ---------------------------------------------------------------------------
# mypy
# ---------------------------------------------------------------------------
[tool.mypy]
python_version = "3.10"
platform = "linux"
warn_return_any = true
warn_unused_configs = true
check_untyped_defs = true
no_implicit_optional = true
warn_redundant_casts = true
warn_unused_ignores = true
warn_no_return = true
warn_unreachable = true
strict_equality = true
ignore_missing_imports = true
